<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta name="robots" content="index,follow" />
    <meta name="application-name" content="Achille Traore Portfolio" />
    <meta
      name="description"
      content="Achille Traore portfolio platform for DevOps, cloud delivery, and full-stack portfolio content."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://achille.tech" />
    <meta property="og:title" content="Achille Traore — DevOps Engineer & Full-Stack Software Engineer" />
    <meta
      property="og:description"
      content="Platform and DevOps engineer with 8+ years building CI/CD pipelines, Kubernetes platforms, and cloud infrastructure — plus full-stack applications in production."
    />
    <meta property="og:image" content="https://achille.tech/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://achille.tech" />
    <meta name="twitter:title" content="Achille Traore — DevOps Engineer & Full-Stack Software Engineer" />
    <meta
      name="twitter:description"
      content="Platform and DevOps engineer with 8+ years building CI/CD pipelines, Kubernetes platforms, and cloud infrastructure — plus full-stack applications in production."
    />
    <meta name="twitter:image" content="https://achille.tech/og-image.png" />
    <title>Achille Traore | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Prevent flash of wrong theme before React loads -->
    <script>
      (function () {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
